<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0c0904" />
  <meta name="description" content="Día Mundial de la Poesía — 21 de Marzo" />
  <title>Día de la Poesía ✦</title>

  <!-- Fuentes: Cormorant Garamond (poema) + Jost (UI) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─── VARIABLES ─────────────────────────────────────── */
    :root {
      --ink:       #0c0904;
      --ink-mid:   #1a140d;
      --ink-light: #2a2018;
      --parchment: #f2ead8;
      --cream:     #e8dfc8;
      --gold:      #c9933a;
      --gold-dim:  #8a6428;
      --rust:      #9e4c2a;
      --mist:      rgba(242, 234, 216, 0.08);
      --mist2:     rgba(201, 147, 58, 0.12);
      --font-poem: 'Cormorant Garamond', Georgia, serif;
      --font-ui:   'Jost', system-ui, sans-serif;
    }

    /* ─── RESET ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100dvh;
      background: var(--ink);
      color: var(--parchment);
      font-family: var(--font-ui);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
      position: relative;
    }

    /* ─── CANVAS PARTÍCULAS ─────────────────────────────── */
    #particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.45;
    }

    /* ─── LAYOUT ─────────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      min-height: 100dvh;
      padding: 0 24px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ─── CABECERA ───────────────────────────────────────── */
    header {
      width: 100%;
      padding: 40px 0 28px;
      text-align: center;
      border-bottom: 1px solid rgba(201, 147, 58, 0.2);
      margin-bottom: 36px;
    }

    .event-label {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
      display: block;
    }

    .site-title {
      font-family: var(--font-poem);
      font-size: clamp(32px, 9vw, 42px);
      font-weight: 300;
      line-height: 1.15;
      color: var(--parchment);
      letter-spacing: -0.5px;
    }

    .site-title em {
      font-style: italic;
      color: var(--gold);
    }

    .date-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(242, 234, 216, 0.45);
    }

    .date-badge::before,
    .date-badge::after {
      content: '';
      display: inline-block;
      width: 24px;
      height: 1px;
      background: rgba(201, 147, 58, 0.35);
    }

    /* ─── TARJETA DEL POEMA ──────────────────────────────── */
    .poem-card {
      width: 100%;
      background: var(--ink-mid);
      border: 1px solid rgba(201, 147, 58, 0.18);
      border-radius: 2px;
      padding: 36px 32px 32px;
      position: relative;
      overflow: hidden;
    }

    /* Ornamento esquina superior izquierda */
    .poem-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 60px; height: 60px;
      border-top: 1.5px solid var(--gold-dim);
      border-left: 1.5px solid var(--gold-dim);
      border-radius: 0;
      opacity: 0.6;
    }

    /* Ornamento esquina inferior derecha */
    .poem-card::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 60px; height: 60px;
      border-bottom: 1.5px solid var(--gold-dim);
      border-right: 1.5px solid var(--gold-dim);
      opacity: 0.6;
    }

    /* Glow sutil en el card */
    .poem-card-glow {
      position: absolute;
      top: -40px; left: 50%;
      transform: translateX(-50%);
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(201, 147, 58, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Contador / badge aleatorio */
    .random-badge {
      font-family: var(--font-ui);
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .random-badge::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(201, 147, 58, 0.2);
    }

    /* Título del poema */
    .poem-title {
      font-family: var(--font-poem);
      font-size: clamp(22px, 6vw, 28px);
      font-weight: 600;
      color: var(--parchment);
      line-height: 1.2;
      margin-bottom: 6px;
      letter-spacing: -0.2px;
    }

    /* Autor */
    .poem-author {
      font-family: var(--font-ui);
      font-size: 11.5px;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 28px;
    }

    .poem-author span {
      color: rgba(242, 234, 216, 0.3);
      margin: 0 6px;
    }

    /* Separador ornamental */
    .ornament {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .ornament::before,
    .ornament::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201, 147, 58, 0.25), transparent);
    }

    .ornament-symbol {
      font-family: var(--font-poem);
      font-size: 14px;
      color: var(--gold-dim);
      line-height: 1;
    }

    /* Texto del poema */
    .poem-text {
      font-family: var(--font-poem);
      font-size: clamp(18px, 5vw, 21px);
      font-weight: 300;
      font-style: italic;
      line-height: 1.9;
      color: var(--cream);
      letter-spacing: 0.2px;
      white-space: pre-line;
    }

    /* Año */
    .poem-year {
      margin-top: 24px;
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 200;
      letter-spacing: 2.5px;
      color: rgba(242, 234, 216, 0.2);
      text-align: right;
    }

    /* ─── ANIMACIÓN DE TRANSICIÓN ────────────────────────── */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeSlideOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-14px); }
    }

    .poem-card.entering {
      animation: fadeSlideIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .poem-card.exiting {
      animation: fadeSlideOut 0.35s ease-in forwards;
    }

    /* ─── BOTÓN ──────────────────────────────────────────── */
    .btn-wrap {
      width: 100%;
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .btn-next {
      width: 100%;
      padding: 18px 28px;
      background: transparent;
      border: 1px solid rgba(201, 147, 58, 0.4);
      border-radius: 2px;
      color: var(--parchment);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-next::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(201, 147, 58, 0.06);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }

    .btn-next:hover::before,
    .btn-next:active::before {
      transform: scaleX(1);
    }

    .btn-next:active {
      transform: scale(0.98);
      border-color: rgba(201, 147, 58, 0.7);
    }

    .btn-icon {
      font-size: 14px;
      color: var(--gold);
      transition: transform 0.3s ease;
    }

    .btn-next:active .btn-icon {
      transform: rotate(45deg);
    }

    /* Contador de poemas */
    .poem-counter {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 2px;
      color: rgba(242, 234, 216, 0.2);
    }

    /* ─── PIE DE PÁGINA ──────────────────────────────────── */
    footer {
      margin-top: 48px;
      text-align: center;
      width: 100%;
      border-top: 1px solid rgba(201, 147, 58, 0.1);
      padding-top: 28px;
    }

    .footer-quote {
      font-family: var(--font-poem);
      font-size: 13px;
      font-style: italic;
      font-weight: 300;
      color: rgba(242, 234, 216, 0.25);
      line-height: 1.7;
    }

    .footer-org {
      margin-top: 12px;
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(242, 234, 216, 0.12);
    }

    /* ─── RESPONSIVE AJUSTES ─────────────────────────────── */
    @media (max-width: 360px) {
      .poem-card { padding: 28px 22px 26px; }
      .poem-text { font-size: 17px; }
    }

    @media (min-width: 600px) {
      .poem-card { padding: 48px 44px 40px; }
    }
  </style>
</head>
<body>

<!-- Fondo con partículas de tinta -->
<canvas id="particles" aria-hidden="true"></canvas>

<main class="page" role="main">

  <!-- Cabecera -->
  <header>
    <span class="event-label">UNESCO · 21 de Marzo</span>
    <h1 class="site-title">Día de la<br><em>Poesía</em></h1>
    <div class="date-badge">2025</div>
  </header>

  <!-- Tarjeta del poema -->
  <article class="poem-card entering" id="poemCard" aria-live="polite" aria-atomic="true">
    <div class="poem-card-glow" aria-hidden="true"></div>
    <div class="random-badge" id="randomBadge" aria-label="Poema seleccionado al azar">✦ selección aleatoria</div>
    <h2 class="poem-title" id="poemTitle"></h2>
    <p class="poem-author" id="poemAuthor"></p>
    <div class="ornament" aria-hidden="true"><span class="ornament-symbol">⁂</span></div>
    <p class="poem-text" id="poemText"></p>
    <p class="poem-year" id="poemYear"></p>
  </article>

  <!-- Botón y controles -->
  <div class="btn-wrap">
    <button class="btn-next" id="btnNext" aria-label="Mostrar otro poema aleatorio">
      <span class="btn-icon" aria-hidden="true">✦</span>
      Leer otro poema
    </button>
    <span class="poem-counter" id="poemCounter" aria-live="polite"></span>
  </div>

  <!-- Pie -->
  <footer>
    <p class="footer-quote">
      "La poesía es el eco de la melodía<br>del universo en el corazón humano."
    </p>
    <p class="footer-org">Día Mundial de la Poesía · UNESCO</p>
  </footer>

</main>

<script>
  /* ═══════════════════════════════════════════
     BASE DE DATOS DE POEMAS
  ═══════════════════════════════════════════ */
  const POEMS = [
    {
      title:  "Rima XXI",
      author: "Gustavo Adolfo Bécquer",
      year:   "España, 1871",
      text:   "¿Qué es poesía?, dices mientras clavas\nen mi pupila tu pupila azul.\n¡Qué es poesía! ¿Y tú me lo preguntas?\nPoesía... eres tú."
    },
    {
      title:  "Puedo escribir",
      author: "Pablo Neruda",
      year:   "Chile, 1924",
      text:   "Puedo escribir los versos más tristes esta noche.\nEscribo, por ejemplo: «La noche está estrellada,\ny tiritan, azules, los astros, a lo lejos.»\nEl viento de la noche gira en el cielo y canta.\nPuedo escribir los versos más tristes esta noche."
    },
    {
      title:  "Cultivo una rosa blanca",
      author: "José Martí",
      year:   "Cuba, 1891",
      text:   "Cultivo una rosa blanca\nen julio como en enero,\npara el amigo sincero\nque me da su mano franca.\n\nY para el cruel que me arranca\nel corazón con que vivo,\ncardo ni ortiga cultivo:\ncultivo la rosa blanca."
    },
    {
      title:  "Sonatina",
      author: "Rubén Darío",
      year:   "Nicaragua, 1893",
      text:   "La princesa está triste... ¿qué tendrá la princesa?\nLos suspiros se escapan de su boca de fresa,\nque ha perdido la risa, que ha perdido el color.\nLa princesa está pálida en su silla de oro."
    },
    {
      title:  "Me gustas cuando callas",
      author: "Pablo Neruda",
      year:   "Chile, 1924",
      text:   "Me gustas cuando callas porque estás como ausente,\ny me oyes desde lejos, y mi voz no te toca.\nParece que los ojos se te hubieran volado\ny parece que un beso te cerrara la boca."
    },
    {
      title:  "Hombre pequeñito",
      author: "Alfonsina Storni",
      year:   "Argentina, 1919",
      text:   "Hombre pequeñito, hombre pequeñito,\nsuelta a tu canario que quiere volar...\nYo soy el canario, hombre pequeñito,\ndéjame saltar.\n\nEstuve en tu jaula, hombre pequeñito,\nhombre pequeñito que jaula me das.\nDigo pequeñito porque no me entiendes,\nni me entenderás."
    },
    {
      title:  "Caminante son tus huellas",
      author: "Antonio Machado",
      year:   "España, 1912",
      text:   "Caminante, son tus huellas\nel camino y nada más;\ncaminante, no hay camino,\nse hace camino al andar.\n\nAl andar se hace el camino,\ny al volver la vista atrás\nse ve la senda que nunca\nse ha de volver a pisar."
    },
    {
      title:  "Versos Sencillos I",
      author: "José Martí",
      year:   "Cuba, 1891",
      text:   "Yo soy un hombre sincero\nde donde crece la palma,\ny antes de morirme quiero\nechar mis versos del alma.\n\nCon los pobres de la tierra\nquiero yo mi suerte echar:\nel arroyo de la sierra\nme complace más que el mar."
    },
    {
      title:  "Amor constante más allá de la muerte",
      author: "Francisco de Quevedo",
      year:   "España, c. 1645",
      text:   "Cerrar podrá mis ojos la postrera\nsombra que me llevare el blanco día,\ny podrá desatar esta alma mía\nhora, a su afán ansioso lisonjera."
    },
    {
      title:  "Amor",
      author: "Gabriela Mistral",
      year:   "Chile, 1922",
      text:   "Eres la raíz febril,\nel tallo, la flor y el fruto.\nEres todas las estaciones\ncabalgando sobre mi pulso.\n\nEres el viento del sur\nque dobla mis sienes de junco.\nY eres el frío del norte,\nque endurece mi cuerpo mudo."
    }
  ];

  /* ═══════════════════════════════════════════
     ESTADO
  ═══════════════════════════════════════════ */
  let currentIndex = -1;
  let isAnimating  = false;

  /* ═══════════════════════════════════════════
     LÓGICA DE POEMA ALEATORIO
  ═══════════════════════════════════════════ */
  function getRandomIndex(exclude) {
    if (POEMS.length === 1) return 0;
    let idx;
    do { idx = Math.floor(Math.random() * POEMS.length); }
    while (idx === exclude);
    return idx;
  }

  function renderPoem(poem, index) {
    document.getElementById('poemTitle').textContent  = poem.title;
    document.getElementById('poemText').textContent   = poem.text;
    document.getElementById('poemYear').textContent   = poem.year;
    document.getElementById('poemAuthor').textContent = poem.author;
    document.getElementById('poemCounter').textContent =
      `Poema ${index + 1} de ${POEMS.length} en la colección`;
  }

  function showPoem(animate = true) {
    if (isAnimating) return;
    const card = document.getElementById('poemCard');

    if (!animate) {
      currentIndex = getRandomIndex(-1);
      renderPoem(POEMS[currentIndex], currentIndex);
      card.classList.add('entering');
      return;
    }

    isAnimating = true;
    card.classList.remove('entering');
    card.classList.add('exiting');

    setTimeout(() => {
      currentIndex = getRandomIndex(currentIndex);
      renderPoem(POEMS[currentIndex], currentIndex);
      card.classList.remove('exiting');
      card.classList.add('entering');

      // Limpiar clase tras animación
      setTimeout(() => { isAnimating = false; }, 650);
    }, 360);
  }

  /* ═══════════════════════════════════════════
     PARTÍCULAS DE TINTA (CANVAS)
  ═══════════════════════════════════════════ */
  (function initParticles() {
    const canvas = document.getElementById('particles');
    const ctx    = canvas.getContext('2d');
    let W, H, particles;

    const SYMBOLS = ['✦', '✧', '·', '—', '∗', '⁂'];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function createParticle() {
      return {
        x:       Math.random() * W,
        y:       H + 20,
        size:    Math.random() * 9 + 6,
        symbol:  SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)],
        alpha:   Math.random() * 0.18 + 0.04,
        speed:   Math.random() * 0.3 + 0.1,
        drift:   (Math.random() - 0.5) * 0.3,
        rot:     Math.random() * 360,
        rotSpd:  (Math.random() - 0.5) * 0.4
      };
    }

    function initParticles() {
      particles = Array.from({ length: 28 }, () => {
        const p = createParticle();
        p.y = Math.random() * H; // Distribuir verticalmente al inicio
        return p;
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.font = '12px serif';

      particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle   = '#c9933a';
        ctx.font        = `${p.size}px serif`;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.fillText(p.symbol, 0, 0);
        ctx.restore();

        p.y     -= p.speed;
        p.x     += p.drift;
        p.rot   += p.rotSpd;
        p.alpha  = Math.max(0, p.alpha - 0.00015);

        if (p.y < -20 || p.alpha <= 0) {
          Object.assign(p, createParticle());
        }
      });

      requestAnimationFrame(draw);
    }

    resize();
    initParticles();
    draw();
    window.addEventListener('resize', () => { resize(); });
  })();

  /* ═══════════════════════════════════════════
     INICIALIZACIÓN
  ═══════════════════════════════════════════ */
  showPoem(false);

  document.getElementById('btnNext').addEventListener('click', () => showPoem(true));

  // Swipe hacia arriba en mobile como atajo
  let touchStartY = 0;
  document.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
  document.addEventListener('touchend', e => {
    const dy = touchStartY - e.changedTouches[0].clientY;
    if (dy > 60) showPoem(true); // swipe up
  }, { passive: true });
</script>
</body>
</html>
